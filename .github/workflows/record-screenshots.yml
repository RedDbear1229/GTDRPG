name: Record Paparazzi Screenshots

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths:
      - 'app/src/main/**'
      - 'app/src/test/java/com/questlog/screenshot/**'

jobs:
  record:
    name: Record & Commit Snapshots
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Record Paparazzi snapshots
        run: ./gradlew recordPaparazziDebug --tests "com.questlog.screenshot.CoreComponentsPaparazziTest" --stacktrace

      - name: Commit snapshots if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/src/test/snapshots/
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "chore(screenshot): Paparazzi 스냅샷 갱신 [skip ci]"
            git push
          fi
