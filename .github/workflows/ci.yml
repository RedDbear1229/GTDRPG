name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  unit-tests:
    name: Unit Tests + Screenshot Regression
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Verify Paparazzi screenshots
        run: |
          if [ -d "app/src/test/snapshots" ]; then
            ./gradlew verifyPaparazziDebug --stacktrace
          else
            echo "No snapshots recorded yet — skipping verify. Run record-screenshots workflow first."
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            app/build/reports/tests/
            app/build/reports/paparazzi/
          retention-days: 7

      - name: Upload Paparazzi failure diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: paparazzi-diffs
          path: app/build/paparazzi/failures/
          retention-days: 7

  e2e-tests:
    name: E2E Instrumented Tests
    runs-on: ubuntu-latest
    # E2E tests run on emulator — skip on draft PRs to save CI minutes
    if: github.event_name == 'push' || !github.event.pull_request.draft

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Enable KVM for emulator acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run E2E tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_5
          script: ./gradlew connectedDebugAndroidTest --stacktrace

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: app/build/reports/androidTests/
          retention-days: 7
