name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Rename APK with commit SHA
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          cp app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/QuestLog-nightly-${SHORT_SHA}.apk

      - name: Create nightly pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Build"
          body: |
            자동 빌드 — ${{ github.sha }} (${{ github.event.head_commit.message }})
          prerelease: true
          make_latest: false
          files: app/build/outputs/apk/debug/QuestLog-nightly-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
